<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogo da Adivinhação</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1> JOGO DA ADIVINHAÇÃO</h1>

    <p>
      Tente descobrir o número secreto entre
      <strong>1 e 100</strong>
    </p>

    <input type="number" id="palpite" placeholder="Digite um número">

    <br>

    <button onclick="verificarNumero()">
      ADIVINHAR
    </button>

    <button onclick="reiniciarJogo()">
      REINICIAR
    </button>

    <div id="mensagem"></div>

    <div id="tentativas">
      Tentativas: 0
    </div>

  </div>

  <script src="script.js"></script>

</body>

</footer>
</html>
